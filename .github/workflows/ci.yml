name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.5.2"

jobs:
  typescript:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check
        run: pnpm type-check

      - name: Build Project
        run: pnpm build

  eslint:
    name: ESLint Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

  prettier:
    name: Prettier Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Check Formatting
        run: pnpm format:check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  pr-comment:
    name: PR Status Comment
    runs-on: ubuntu-latest

    needs:
      - typescript
      - eslint
      - prettier
      - security

    if: always() && github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Update PR Comment
        uses: actions/github-script@v8
        with:
          script: |
            const checks = [
              { name: "TypeScript", status: "${{ needs.typescript.result }}" },
              { name: "ESLint", status: "${{ needs.eslint.result }}" },
              { name: "Prettier", status: "${{ needs.prettier.result }}" },
              { name: "Security Audit", status: "${{ needs.security.result }}" },
            ];

            const icons = {
              success: "✅ Passed",
              failure: "❌ Failed",
              cancelled: "🚫 Cancelled",
              skipped: "⏭️ Skipped",
            };

            const body = `## 🚀 CI Results

            ${checks
              .map(c => `- **${c.name}**: ${icons[c.status] || c.status}`)
              .join("\n")}

            ---
            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref || github.ref_name }}\`
            **Author:** @${{ github.actor }}

            _This comment is automatically updated._`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } =
              await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
              });

            const existing = comments.find(
              c =>
                c.user.type === "Bot" &&
                c.body.includes("## 🚀 CI Results")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
